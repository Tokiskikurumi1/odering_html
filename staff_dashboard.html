<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Kurumi BBQ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="staff_dashboard.css">
    <link rel="stylesheet" href="stdsh_sidebar.css">
    <link rel="stylesheet" href="stdsh_tab_reservations.css">
    <link rel="stylesheet" href="stdsh_tab_tables.css">
    <link rel="stylesheet" href="stdsh_tab_billing.css">
    <link rel="stylesheet" href="stdsh_tab_support.css">
</head>
<body class="stdsh-body">
    <!-- Background Animated Elements -->
    <div class="stdsh-bg-orb stdsh-bg-orb-1"></div>
    <div class="stdsh-bg-orb stdsh-bg-orb-2"></div>
    <div class="stdsh-bg-orb stdsh-bg-orb-3"></div>

    <div class="stdsh-layout-wrapper">
        <!-- Sidebar Placeholder -->
        <div id="stdsh-sidebar-placeholder"></div>

        <!-- Main Content Area -->
        <main class="stdsh-main-content">
            <header class="stdsh-main-header">
                <h1 id="stdsh-header-title">Duyệt Đặt Bàn Trực Tuyến</h1>
                <div class="stdsh-header-actions">
                    <div class="stdsh-time-display" id="stdsh-current-time">10:00 AM</div>
                </div>
            </header>

            <div class="stdsh-tab-container">
                <!-- TAB Placeholders -->
                <div id="stdsh-tab-reservations-placeholder"></div>
                <div id="stdsh-tab-tables-placeholder"></div>
                <div id="stdsh-tab-billing-placeholder"></div>
                <div id="stdsh-tab-support-placeholder"></div>
            </div>
        </main>
    </div>

    <!-- Modals (Since modals are part of billing logic, they can be kept here or in billing html) -->
    <!-- Let's keep them here since billing CSS is loaded globally -->
    
    <!-- QR Payment Modal -->
    <div class="stdsh-modal-overlay" id="stdsh-modal-qr">
        <div class="stdsh-modal-box">
            <button class="stdsh-modal-close" data-close="stdsh-modal-qr"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="stdsh-modal-title">Thanh Toán Chuyển Khoản</h3>
            <div class="stdsh-qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ThanhToan_Kurumi" alt="QR Code">
            </div>
            <p class="stdsh-qr-instruction">Khách hàng quét mã QR để thanh toán <br><strong id="stdsh-qr-amount"></strong></p>
            <button class="stdsh-btn-primary stdsh-btn-full" id="stdsh-btn-confirm-qr-paid">
                Xác nhận đã nhận tiền & Xuất hóa đơn
            </button>
        </div>
    </div>

    <!-- Invoice Success Modal -->
    <div class="stdsh-modal-overlay" id="stdsh-modal-invoice">
        <div class="stdsh-modal-box stdsh-modal-success">
            <div class="stdsh-success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="stdsh-modal-title">Thanh Toán Thành Công!</h3>
            <p>Hóa đơn đã được xuất và trạng thái bàn đã chuyển thành <strong>Trống</strong>.</p>
            <button class="stdsh-btn-primary stdsh-btn-full" data-close="stdsh-modal-invoice">
                Đóng
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="stdsh_sidebar.js"></script>
    <script src="stdsh_tab_reservations.js"></script>
    <script src="stdsh_tab_tables.js"></script>
    <script src="stdsh_tab_billing.js"></script>
    <script src="stdsh_tab_support.js"></script>
    <script src="staff_dashboard.js"></script>
</body>
</html>
