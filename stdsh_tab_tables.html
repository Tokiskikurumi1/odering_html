                <!-- TAB 2: Tables & Walk-in -->
                <section id="stdsh-tab-tables" class="stdsh-tab-pane">
                    <div class="stdsh-tables-layout">
                        
                        <!-- Walk-in Form -->
                        <div class="stdsh-walkin-panel">
                            <h3><i class="fa-solid fa-user-plus"></i> Đón Khách Trực Tiếp</h3>
                            <form id="stdsh-walkin-form">
                                <div class="stdsh-form-group">
                                    <input type="text" id="stdsh-walkin-name" required placeholder=" ">
                                    <label for="stdsh-walkin-name">Tên Khách Hàng</label>
                                </div>
                                <div class="stdsh-form-group">
                                    <input type="number" id="stdsh-walkin-guests" min="1" required placeholder=" ">
                                    <label for="stdsh-walkin-guests">Số Lượng Khách</label>
                                </div>
                                <div class="stdsh-form-group">
                                    <select id="stdsh-walkin-table" required>
                                        <option value="" disabled selected>-- Chọn Bàn Trống --</option>
                                        <!-- Dynamic empty tables -->
                                    </select>
                                    <label for="stdsh-walkin-table" class="stdsh-static-label">Chọn Bàn</label>
                                </div>
                                <button type="submit" class="stdsh-btn-primary">
                                    <i class="fa-solid fa-check"></i> Nhận Bàn
                                </button>
                            </form>
                        </div>

                        <!-- Table Grid -->
                        <div class="stdsh-table-map-panel">
                            <div class="stdsh-table-legend">
                                <div class="stdsh-legend-item"><span class="stdsh-dot stdsh-dot-empty"></span> Trống</div>
                                <div class="stdsh-legend-item"><span class="stdsh-dot stdsh-dot-occupied"></span> Đang phục vụ</div>
                                <div class="stdsh-legend-item"><span class="stdsh-dot stdsh-dot-reserved"></span> Đã đặt</div>
                            </div>
                            <div class="stdsh-table-nav">
                                <button class="stdsh-nav-btn active" data-filter="all">Tất cả</button>
                                <button class="stdsh-nav-btn" data-filter="small">Bàn thường</button>
                                <button class="stdsh-nav-btn" data-filter="large">Bàn lớn (VIP)</button>
                            </div>
                            <div class="stdsh-table-grid" id="stdsh-table-grid-container">
                                <!-- Dynamic tables injected by JS -->
                            </div>
                        </div>

                        <!-- Table Details Modal -->
                        <div class="stdsh-modal-overlay" id="stdsh-modal-table-details">
                            <div class="stdsh-modal-box" style="max-width: 400px;">
                                <button class="stdsh-modal-close" data-close="stdsh-modal-table-details"><i class="fa-solid fa-xmark"></i></button>
                                <h2 class="stdsh-modal-title">Chi Tiết Bàn</h2>
                                <div style="text-align: left; color: var(--stdsh-text-muted); line-height: 2; font-size: 1.05rem;">
                                    <p><strong style="color: #fff; display: inline-block; width: 120px;">Số bàn:</strong> <span id="stdsh-detail-modal-table"></span></p>
                                    <p><strong style="color: #fff; display: inline-block; width: 120px;">Tên khách:</strong> <span id="stdsh-detail-modal-name"></span></p>
                                    <p><strong style="color: #fff; display: inline-block; width: 120px;">Số điện thoại:</strong> <span id="stdsh-detail-modal-phone"></span></p>
                                    <p><strong style="color: #fff; display: inline-block; width: 120px;">Số người:</strong> <span id="stdsh-detail-modal-size"></span></p>
                                    <p><strong style="color: #fff; display: inline-block; width: 120px;">Giờ đặt/vào:</strong> <span id="stdsh-detail-modal-time"></span></p>
                                </div>
                            </div>
                        </div>

                    </div>
                </section>
